name: Proto CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install protoc v34.1
        run: |
          curl -fsSL -o /tmp/protoc.zip \
            https://github.com/protocolbuffers/protobuf/releases/download/v34.1/protoc-34.1-linux-x86_64.zip
          sudo unzip -o /tmp/protoc.zip -d /usr/local bin/protoc 'include/*'
          protoc --version

      - name: Install Go protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Regenerate stubs and check for drift
        run: |
          protoc \
            --proto_path=. \
            --go_out=gen \
            --go_opt=paths=source_relative \
            --go-grpc_out=gen \
            --go-grpc_opt=paths=source_relative \
            panelplay/v1/*.proto
          git diff --exit-code gen/ || (echo "ERROR: generated stubs are out of date — run protoc locally and commit" && exit 1)

      - name: Build
        run: go build ./...
